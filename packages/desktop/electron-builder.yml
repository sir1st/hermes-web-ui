appId: com.hermesagent.desktop
productName: Hermes Desktop
copyright: Copyright © 2026

# In an npm workspaces setup the `electron` devDependency gets hoisted to
# the repo-root node_modules, so electron-builder can't introspect it from
# this package's own node_modules. Pin the version explicitly to short-
# circuit that lookup (see electron-userland/electron-builder#3984).
electronVersion: 42.3.0

directories:
  output: release
  buildResources: build
  app: .

# Don't auto-prune our root node_modules; we curate `files` and `extraResources` ourselves.
buildDependenciesFromSource: false
nodeGypRebuild: false
npmRebuild: false

files:
  - "dist/**/*"
  - "package.json"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme,LICENSE,LICENSE.txt,license,*.d.ts}"
  - "!**/node_modules/.bin"
  - "!**/{.DS_Store,.git,.gitignore,.eslintrc*,.prettierrc*,*.map,tsconfig.json}"

# Web UI built bundle (from monorepo root: ../../) and bundled Python live outside the asar.
# `from: "../../"` points at the hermes-web-ui repo root since this package lives at
# packages/desktop/. We pull only the built `dist/` and `node_modules/` plus package.json
# (the server's health controller reads it for name/version at runtime).
extraResources:
  - from: "../../"
    to: "webui"
    filter:
      - "package.json"
      - "dist/**"
      - "node_modules/**"
      # Drop other-platform node-pty prebuilds (saves ~45MB)
      - "!node_modules/node-pty/prebuilds/!(${platform}-${arch})/**"
      - "!node_modules/node-pty/build/**"
      - "!node_modules/**/*.map"
      - "!node_modules/**/.git"
      - "!node_modules/**/docs/**"
      - "!node_modules/**/test/**"
      - "!node_modules/**/tests/**"
      - "!**/{.DS_Store,.github,playwright.config.ts,*.md,README*}"
  - from: "resources/python/${os}-${arch}"
    to: "python"
    filter:
      - "**/*"

asarUnpack:
  - "**/*.node"

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  artifactName: "${productName}-${version}-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: "${productName}-${version}-${arch}.${ext}"

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64]   # fpm has no arm64 binary; deb only on x64
  category: Development
  artifactName: "${productName}-${version}-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

publish:
  provider: github
  owner: sir1st
  repo: hermes-desktop
