name: Desktop Build

on:
  push:
    branches:
      - main
    paths:
      - 'packages/desktop/**'
      - '.github/workflows/desktop-build.yml'
    tags:
      - 'desktop-v*'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/desktop/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            target_os: darwin
            target_arch: arm64
            electron_args: "--mac dmg --arm64"
            artifact_glob: |
              packages/desktop/release/*.dmg
              packages/desktop/release/*.dmg.blockmap
              packages/desktop/release/latest-mac.yml
          - label: macOS x64
            runner: macos-15-intel
            target_os: darwin
            target_arch: x64
            electron_args: "--mac dmg --x64"
            artifact_glob: |
              packages/desktop/release/*.dmg
              packages/desktop/release/*.dmg.blockmap
              packages/desktop/release/latest-mac.yml
          - label: Windows x64
            runner: windows-latest
            target_os: win32
            target_arch: x64
            electron_args: "--win nsis --x64"
            artifact_glob: |
              packages/desktop/release/*.exe
              packages/desktop/release/*.exe.blockmap
              packages/desktop/release/latest.yml
          - label: Linux x64
            runner: ubuntu-22.04
            target_os: linux
            target_arch: x64
            electron_args: "--linux AppImage deb --x64"
            artifact_glob: |
              packages/desktop/release/*.AppImage
              packages/desktop/release/*.deb
              packages/desktop/release/latest-linux.yml
          - label: Linux arm64
            runner: ubuntu-22.04-arm
            target_os: linux
            target_arch: arm64
            electron_args: "--linux AppImage --arm64"
            artifact_glob: |
              packages/desktop/release/*.AppImage
              packages/desktop/release/latest-linux-arm64.yml

    runs-on: ${{ matrix.runner }}

    env:
      # electron-builder uses GH_TOKEN to publish or look up update channels.
      # Auto-updater also reads it on Windows to fetch update manifests.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # macOS code-signing placeholders — only effective when the secrets exist.
      # When empty, electron-builder skips signing/notarization gracefully.
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # Windows code-signing placeholders.
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Rebuild node-pty
        run: npm rebuild node-pty

      - name: Build hermes-web-ui (client + server)
        run: npm run build

      - name: Fetch bundled Python + install hermes-agent
        working-directory: packages/desktop
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: npm run prepare:python

      - name: Package with electron-builder
        working-directory: packages/desktop
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: npm run dist -- ${{ matrix.electron_args }} --publish never

      - name: List release output
        if: always()
        shell: bash
        run: ls -la packages/desktop/release || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
